<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CelestialKinThreads — Chart Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&family=Noto+Sans+Symbols+2&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;min-height:100vh;background:#02060f;display:flex;justify-content:center;align-items:flex-start;padding:2rem 1rem;}
.page{width:900px;}
.header{text-align:center;padding:2.5rem 0 2rem;}
.ht{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:0.55em;text-transform:uppercase;color:#c9a84c;margin-bottom:10px;}
.hn{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;font-style:italic;color:#e8d5a0;letter-spacing:0.08em;margin-bottom:6px;}
.hdiv{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:14px;}
.hdivl{width:120px;height:0.5px;background:linear-gradient(90deg,transparent,#c9a84c,transparent);}

/* Form */
.form-card{background:rgba(8,14,28,0.9);border:0.5px solid rgba(201,168,76,0.4);border-radius:12px;padding:28px 36px;margin-bottom:2rem;}
.form-title{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:0.45em;text-transform:uppercase;color:#c9a84c;text-align:center;margin-bottom:20px;display:flex;align-items:center;gap:14px;}
.form-title::before,.form-title::after{content:'';flex:1;height:0.5px;background:rgba(201,168,76,0.3);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group.full{grid-column:1/-1;}
label{font-family:'EB Garamond',serif;font-size:12px;letter-spacing:0.2em;text-transform:uppercase;color:#7a9ab8;}
input,select{background:rgba(255,255,255,0.04);border:0.5px solid rgba(201,168,76,0.3);border-radius:6px;padding:10px 14px;color:#e8d5a0;font-family:'EB Garamond',serif;font-size:14px;outline:none;transition:border-color 0.2s;}
input:focus,select:focus{border-color:rgba(201,168,76,0.7);}
select option{background:#0a1528;color:#e8d5a0;}
.generate-btn{display:block;width:100%;margin-top:20px;font-family:'Jost',sans-serif;font-size:12px;letter-spacing:0.3em;text-transform:uppercase;padding:14px;background:rgba(201,168,76,0.12);color:#c9a84c;border:0.5px solid #c9a84c;border-radius:8px;cursor:pointer;transition:background 0.2s;}
.generate-btn:hover{background:rgba(201,168,76,0.22);}
.generate-btn:disabled{opacity:0.4;cursor:not-allowed;}

/* Status */
.status{text-align:center;font-family:'EB Garamond',serif;font-size:14px;color:#7a9ab8;min-height:24px;margin-bottom:1rem;}
.status.error{color:#e87070;}
.status.success{color:#7ab87a;}

/* Chart output */
.chart-wrap{display:none;}
canvas#wheel{display:block;margin:0 auto;position:relative;}
.pt{margin:1rem auto 0;width:820px;background:rgba(8,14,28,0.9);border:0.5px solid rgba(201,168,76,0.4);border-radius:12px;padding:18px 0;}
.pt-title{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:0.45em;text-transform:uppercase;color:#c9a84c;text-align:center;margin-bottom:14px;display:flex;align-items:center;gap:14px;padding:0 20px;}
.pt-title::before,.pt-title::after{content:'';flex:1;height:0.5px;background:rgba(201,168,76,0.3);}
.pt-rows{display:grid;grid-template-columns:1fr 1px 1fr;}
.pt-div{background:rgba(201,168,76,0.2);}
.pt-col{display:flex;flex-direction:column;align-items:center;}
.pt-row{display:grid;grid-template-columns:22px 90px 60px 120px;align-items:center;gap:6px;padding:5px 0;border-bottom:0.5px solid rgba(201,168,76,0.08);}
.pt-row.last{border-bottom:none;}
.pg{font-family:'Noto Sans Symbols 2','Segoe UI Symbol',sans-serif;font-size:14px;color:#c9a84c;text-align:center;}
.pn{font-family:'EB Garamond',serif;font-size:13px;color:#9ab8d4;}
.pd{font-family:'EB Garamond',serif;font-size:13px;color:#e8d5a0;}
.ps{font-family:'Noto Sans Symbols 2','Segoe UI Symbol',sans-serif;font-size:13px;color:#c9a84c;}
.pt-axis{display:grid;grid-template-columns:1fr 1px 1fr;margin-top:12px;padding-top:12px;border-top:0.5px solid rgba(201,168,76,0.2);}
.pt-ai{display:flex;justify-content:center;}
.pt-ain{display:grid;grid-template-columns:22px 100px 60px 120px;align-items:center;gap:6px;padding:4px 0;}
.pt-al{font-family:'EB Garamond',serif;font-size:13px;color:#c9a84c;font-style:italic;}
.dl-btn{display:block;margin:1.5rem auto 0;font-family:'Jost',sans-serif;font-size:12px;letter-spacing:0.22em;text-transform:uppercase;padding:13px 36px;background:transparent;color:#c9a84c;border:0.5px solid #c9a84c;border-radius:8px;cursor:pointer;}
.dl-btn:hover{background:rgba(201,168,76,0.08);}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="ht">CelestialKinThreads</div>
    <div class="hn">Natal Chart Generator</div>
    <div class="hdiv"><div class="hdivl"></div><span style="color:#c9a84c;font-size:11px;">✦</span><div class="hdivl"></div></div>
  </div>

  <div class="form-card">
    <div class="form-title">Birth Information</div>
    <div class="form-grid">
      <div class="form-group full">
        <label>Full Name</label>
        <input type="text" id="f-name" placeholder="e.g. John Little" value="John Little">
      </div>
      <div class="form-group">
        <label>Birth Date</label>
        <input type="date" id="f-date" value="1967-09-02">
      </div>
      <div class="form-group">
        <label>Birth Time</label>
        <input type="time" id="f-time" value="12:40">

        <label>Birth City</label>

    <canvas id="wheel" width="2700" height="2700" style="width:860px;height:860px;display:block;margin:0 auto;"></canvas>
    <div class="pt" id="planet-table"></div>
    <button class="dl-btn" id="dl-btn">↓ Download Chart PNG</button>
  </div>
</div>

<script>
var API_KEY = 'cc7c9394f0msh2ad197e0fdec333p192002jsnd9c825ca7691';
var API_HOST = 'astrologer.p.rapidapi.com';

// ── GEOCODING via nominatim ──
async function geocode(city, country){
  var q = encodeURIComponent(city + ', ' + country);
  var r = await fetch('https://nominatim.openstreetmap.org/search?q='+q+'&format=json&limit=1');
  var d = await r.json();
  if(!d||!d[0]) throw new Error('City not found: ' + city);
  return {lat: parseFloat(d[0].lat), lng: parseFloat(d[0].lon), display: d[0].display_name};
}

// ── TIMEZONE lookup ──
async function getTimezone(lat, lng){
  // Use timeapi.io free service
  var r = await fetch('https://timeapi.io/api/timezone/coordinate?latitude='+lat+'&longitude='+lng);
  var d = await r.json();
  if(!d||!d.timeZone) throw new Error('Could not determine timezone');
  return d.timeZone;
}

// ── API CALL ──
async function fetchChart(name, year, month, day, hour, minute, lat, lng, city, timezone){
  var body = {
    subject: {
      name: name,
      year: year, month: month, day: day,
      hour: hour, minute: minute,
      longitude: lng, latitude: lat,
      city: city,
      timezone: timezone,
      zodiac_type: 'Tropical',
      houses_system_identifier: 'P'
    }
  };
  var r = await fetch('https://'+API_HOST+'/api/v5/chart/birth-chart', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-rapidapi-key': API_KEY,
      'x-rapidapi-host': API_HOST
    },
    body: JSON.stringify(body)
  });
  if(!r.ok) {
    var errText = await r.text();
    console.log('API error response:', errText);
    throw new Error('API error: ' + r.status + ' — ' + errText);
  }
  return await r.json();
}

// ── PARSE API RESPONSE ──
function parseChart(data){
  console.log('Raw API response:', JSON.stringify(data).substring(0,500));
  var planets = {};
  var houses = [];

  // v5 structure: data.chart_data.subject or data.chart_data.subjects.first
  var cd = data.chart_data || data;
  var subj = cd.subject || (cd.subjects && cd.subjects.first) || cd;

  var planetKeys = ['sun','moon','mercury','venus','mars','jupiter','saturn','uranus','neptune','pluto'];
  planetKeys.forEach(function(k){
    var p = subj[k];
    if(p){
      planets[k] = {
        ecl: p.abs_pos !== undefined ? p.abs_pos : p.position,
        sign: p.sign,
        deg: p.position,
        retrograde: p.retrograde || false
      };
    }
  });

  // ASC = first house, MC = tenth house
  var housesArr = subj.houses || cd.houses || [];
  if(housesArr.length >= 12){
    housesArr.forEach(function(h){
      houses.push(h.abs_pos !== undefined ? h.abs_pos : h.position);
    });
    planets.asc = { ecl: houses[0] };
    planets.mc  = { ecl: houses[9] };
  } else {
    // Try direct first_house / tenth_house keys
    var asc = subj.first_house  || subj.ascendant;
    var mc  = subj.tenth_house  || subj.mc;
    if(asc) planets.asc = { ecl: asc.abs_pos !== undefined ? asc.abs_pos : asc.position };
    if(mc)  planets.mc  = { ecl: mc.abs_pos  !== undefined ? mc.abs_pos  : mc.position  };
    // Build houses array from individual house keys
    for(var h=1;h<=12;h++){
      var hk = ['first','second','third','fourth','fifth','sixth','seventh','eighth','ninth','tenth','eleventh','twelfth'][h-1]+'_house';
      var hh = subj[hk];
      if(hh) houses.push(hh.abs_pos !== undefined ? hh.abs_pos : hh.position);
    }
  }

  return {planets: planets, houses: houses};
}

// ── DRAW WHEEL ──
function drawWheel(chartData, name, dateStr){
  var canvas = document.getElementById('wheel');
  var ctx = canvas.getContext('2d');
  var W=2700, H=2700, cx=1350, cy=1350;
  var RO=1020,RZ=910,RH=810,RP1=710,RP2=646,RC=207;
  var GOLD='#e8d5a0', GOLDC='#c9a84c', GOLDD='rgba(201,168,76,0.6)';

  var asc_ecl = chartData.planets.asc ? chartData.planets.asc.ecl : 0;
  function e2c(ecl){ return -(ecl - asc_ecl) + 180; }
  function rad(d){ return d*Math.PI/180; }
  function pt(r,a){ return [cx+r*Math.cos(rad(a)), cy+r*Math.sin(rad(a))]; }

  ctx.clearRect(0,0,W,H);

  // ── ZODIAC SEGMENTS ──
  var segColors=[
    {fill:'rgba(140,35,35,0.28)',dark:'rgba(100,20,20,0.38)'},
    {fill:'rgba(30,90,50,0.28)',dark:'rgba(15,65,35,0.38)'},
    {fill:'rgba(35,55,140,0.28)',dark:'rgba(20,40,110,0.38)'},
    {fill:'rgba(25,45,120,0.28)',dark:'rgba(15,30,95,0.38)'},
    {fill:'rgba(140,60,15,0.28)',dark:'rgba(110,40,8,0.38)'},
    {fill:'rgba(30,90,50,0.28)',dark:'rgba(15,65,35,0.38)'},
    {fill:'rgba(35,55,140,0.28)',dark:'rgba(20,40,110,0.38)'},
    {fill:'rgba(80,15,80,0.28)',dark:'rgba(60,8,60,0.38)'},
    {fill:'rgba(140,35,35,0.28)',dark:'rgba(100,20,20,0.38)'},
    {fill:'rgba(30,90,50,0.28)',dark:'rgba(15,65,35,0.38)'},
    {fill:'rgba(35,55,140,0.28)',dark:'rgba(20,40,110,0.38)'},
    {fill:'rgba(25,45,120,0.28)',dark:'rgba(15,30,95,0.38)'},
  ];
  var signGlyphs=['♈','♉','♊','♋','♌','♍','♎','♏','♐','♑','♒','♓'];

  for(var s=0;s<12;s++){
    var a1=rad(e2c(s*30)),a2=rad(e2c(s*30+30));
    var mid=e2c(s*30+15), gp=pt((RZ+RO)/2,mid);
    var grad=ctx.createRadialGradient(gp[0],gp[1],0,gp[0],gp[1],(RO-RZ)*0.8);
    grad.addColorStop(0,segColors[s].fill);
    grad.addColorStop(1,segColors[s].dark);
    ctx.beginPath();ctx.arc(cx,cy,RO,a1,a2,true);ctx.arc(cx,cy,RZ,a2,a1,false);ctx.closePath();
    ctx.fillStyle=grad;ctx.fill();
    var p1=pt(RZ,e2c(s*30)),p2=pt(RO,e2c(s*30));
    ctx.beginPath();ctx.moveTo(p1[0],p1[1]);ctx.lineTo(p2[0],p2[1]);
    ctx.strokeStyle=GOLDD;ctx.lineWidth=2.5;ctx.stroke();
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font='50px "Noto Sans Symbols 2","Segoe UI Symbol",sans-serif';
    ctx.fillStyle=GOLDC;ctx.fillText(signGlyphs[s],gp[0],gp[1]);
  }

  // Ticks
  for(var t=0;t<72;t++){
    var isMaj=t%6===0,ta=rad(e2c(t*5));
    var tr2=isMaj?RZ+(RO-RZ)*0.48:RZ+(RO-RZ)*0.24;
    ctx.beginPath();
    ctx.moveTo(cx+RZ*Math.cos(ta),cy+RZ*Math.sin(ta));
    ctx.lineTo(cx+tr2*Math.cos(ta),cy+tr2*Math.sin(ta));
    ctx.strokeStyle=isMaj?'rgba(201,168,76,0.55)':'rgba(201,168,76,0.22)';
    ctx.lineWidth=isMaj?2.5:1.1;ctx.stroke();
  }

  // Borders
  ctx.beginPath();ctx.arc(cx,cy,RO,0,Math.PI*2);ctx.strokeStyle='rgba(201,168,76,0.92)';ctx.lineWidth=4.5;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,RZ,0,Math.PI*2);ctx.strokeStyle='rgba(201,168,76,0.62)';ctx.lineWidth=2.8;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,RH,0,Math.PI*2);ctx.strokeStyle='rgba(201,168,76,0.30)';ctx.lineWidth=1.5;ctx.stroke();

  // House cusps
  var cusps = chartData.houses;
  var axisIdx=[0,3,6,9];
  cusps.forEach(function(ecl,i){
    var ang=rad(e2c(ecl)),isAx=axisIdx.indexOf(i)>=0;
    var rIn=isAx?0:RC+8;
    ctx.beginPath();
    ctx.moveTo(cx+rIn*Math.cos(ang),cy+rIn*Math.sin(ang));
    ctx.lineTo(cx+RH*Math.cos(ang),cy+RH*Math.sin(ang));
    ctx.strokeStyle=isAx?'rgba(201,168,76,0.75)':'rgba(120,155,200,0.28)';
    ctx.lineWidth=isAx?3.0:1.5;ctx.stroke();
  });

  // Axis labels
  [{ecl:cusps[0],l:'AC'},{ecl:cusps[6],l:'DC'},{ecl:cusps[9],l:'MC'},{ecl:cusps[3],l:'IC'}].forEach(function(ax){
    var ang=e2c(ax.ecl),lp=pt((RH+RZ)/2,ang);
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font='bold 31px Georgia,serif';ctx.fillStyle=GOLDC;
    ctx.fillText(ax.l,lp[0],lp[1]);
  });

  // House numbers
  ctx.font='34px Georgia,serif';ctx.fillStyle='rgba(160,145,100,0.60)';ctx.textAlign='center';ctx.textBaseline='middle';
  for(var h=0;h<12;h++){
    var e1=cusps[h],e2n=cusps[(h+1)%12];
    if(e2n<e1)e2n+=360;
    var hm=(e1+e2n)/2,hp=pt(RC+56,e2c(hm));
    ctx.fillText(String(h+1),hp[0],hp[1]);
  }

  // ── PLANETS ──
  var planetDefs=[
    {key:'sun',     glyph:'☉', r:RP2, sz:69},
    {key:'moon',    glyph:'☽', r:RP1, sz:69},
    {key:'mercury', glyph:'☿', r:RP1, sz:69},
    {key:'venus',   glyph:'♀', r:RP1, sz:69},
    {key:'mars',    glyph:'♂', r:RP1, sz:69},
    {key:'jupiter', glyph:'♃', r:RP2, sz:69},
    {key:'saturn',  glyph:'♄', r:RP1, sz:69},
    {key:'uranus',  glyph:'♅', r:RP2, sz:63},
    {key:'neptune', glyph:'♆', r:RP2, sz:63},
    {key:'pluto',   glyph:'♇', r:RP2, sz:63},
  ];

  planetDefs.forEach(function(p){
    var pd = chartData.planets[p.key];
    if(!pd) return;
    var ang = e2c(pd.ecl);
    var pos = pt(p.r, ang);
    var x=pos[0], y=pos[1];
    // Glow
    var glow=ctx.createRadialGradient(x,y,0,x,y,p.sz*2.2);
    glow.addColorStop(0,'rgba(255,252,230,0.45)');
    glow.addColorStop(0.3,'rgba(255,245,200,0.18)');
    glow.addColorStop(0.65,'rgba(255,238,170,0.05)');
    glow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(x,y,p.sz*2.2,0,Math.PI*2);ctx.fillStyle=glow;ctx.fill();
    // Glyph
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font=p.sz+'px "Noto Sans Symbols 2","Segoe UI Symbol",sans-serif';
    ctx.fillStyle=GOLD;
    ctx.shadowColor='rgba(255,248,200,0.5)';ctx.shadowBlur=9;
    ctx.fillText(p.glyph,x,y);
    ctx.shadowBlur=0;
  });

  // ── CENTER STAR ──
  ctx.beginPath();ctx.arc(cx,cy,RC,0,Math.PI*2);
  var cg=ctx.createRadialGradient(cx,cy,0,cx,cy,RC);
  cg.addColorStop(0,'rgba(14,24,48,0.92)');cg.addColorStop(0.5,'rgba(8,15,32,0.88)');cg.addColorStop(1,'rgba(6,12,24,0.82)');
  ctx.fillStyle=cg;ctx.fill();
  ctx.strokeStyle='rgba(201,168,76,0.65)';ctx.lineWidth=2.8;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,RC*0.88,0,Math.PI*2);
  ctx.strokeStyle='rgba(201,168,76,0.2)';ctx.lineWidth=1.2;ctx.stroke();
  for(var ri=0;ri<8;ri++){
    var ra=rad(ri*45-90);
    var rg2=ctx.createLinearGradient(cx+RC*0.22*Math.cos(ra),cy+RC*0.22*Math.sin(ra),cx+RC*0.92*Math.cos(ra),cy+RC*0.92*Math.sin(ra));
    rg2.addColorStop(0,'rgba(201,168,76,0.92)');rg2.addColorStop(0.6,'rgba(201,168,76,0.45)');rg2.addColorStop(1,'rgba(201,168,76,0.02)');
    ctx.beginPath();ctx.moveTo(cx+RC*0.22*Math.cos(ra),cy+RC*0.22*Math.sin(ra));
    ctx.lineTo(cx+RC*0.92*Math.cos(ra),cy+RC*0.92*Math.sin(ra));
    ctx.strokeStyle=rg2;ctx.lineWidth=3.8;ctx.stroke();
  }
  for(var ri2=0;ri2<8;ri2++){
    var ra2=rad(ri2*45-90+22.5);
    ctx.beginPath();ctx.moveTo(cx+RC*0.18*Math.cos(ra2),cy+RC*0.18*Math.sin(ra2));
    ctx.lineTo(cx+RC*0.70*Math.cos(ra2),cy+RC*0.70*Math.sin(ra2));
    ctx.strokeStyle='rgba(201,168,76,0.38)';ctx.lineWidth=2.0;ctx.stroke();
  }
  for(var ri3=0;ri3<16;ri3++){
    var ra3=rad(ri3*22.5-90+11.25);
    ctx.beginPath();ctx.moveTo(cx+RC*0.11*Math.cos(ra3),cy+RC*0.11*Math.sin(ra3));
    ctx.lineTo(cx+RC*0.34*Math.cos(ra3),cy+RC*0.34*Math.sin(ra3));
    ctx.strokeStyle='rgba(201,168,76,0.22)';ctx.lineWidth=1.2;ctx.stroke();
  }
  function starPts(n,r1,r2,startA){
    var pts=[];
    for(var i=0;i<n*2;i++){
      var a=rad(startA+i*(360/(n*2))-90),r=i%2===0?r1:r2;
      pts.push([cx+r*Math.cos(a),cy+r*Math.sin(a)]);
    }
    return pts;
  }
  [{pts:starPts(8,RC*0.64,RC*0.33,-90),op:'rgba(201,168,76,0.36)',lw:2.5},
   {pts:starPts(8,RC*0.50,RC*0.24,-67.5),op:'rgba(201,168,76,0.22)',lw:1.5}].forEach(function(o){
    ctx.beginPath();o.pts.forEach(function(pp,j){j===0?ctx.moveTo(pp[0],pp[1]):ctx.lineTo(pp[0],pp[1]);});
    ctx.closePath();ctx.strokeStyle=o.op;ctx.lineWidth=o.lw;ctx.stroke();
  });
  var cd=ctx.createRadialGradient(cx,cy,0,cx,cy,RC*0.4);
  cd.addColorStop(0,'rgba(255,242,185,1)');cd.addColorStop(0.3,'rgba(201,168,76,0.95)');
  cd.addColorStop(0.7,'rgba(201,168,76,0.2)');cd.addColorStop(1,'rgba(201,168,76,0)');
  ctx.beginPath();ctx.arc(cx,cy,RC*0.4,0,Math.PI*2);ctx.fillStyle=cd;ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,RC*0.075,0,Math.PI*2);ctx.fillStyle='rgba(255,250,220,1)';ctx.fill();
}

// ── BUILD PLANET TABLE ──
function buildTable(chartData, name, dateStr){
  var signGlyphs=['♈','♉','♊','♋','♌','♍','♎','♏','♐','♑','♒','♓'];
  var signNames=['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];
  function signOf(ecl){
    var n = Math.floor(((ecl%360)+360)%360/30);
    return {glyph:signGlyphs[n], name:signNames[n]};
  }
  function degStr(ecl){
    var pos = ((ecl%360)+360)%360 % 30;
    var d=Math.floor(pos), m=Math.floor((pos-d)*60);
    return d+'°'+String(m).padStart(2,'0')+"'";
  }

  var pd = chartData.planets;
  var rows = [
    {g:'☉',n:'Sun',      k:'sun'},
    {g:'☽',n:'Moon',     k:'moon'},
    {g:'☿',n:'Mercury',  k:'mercury'},
    {g:'♀',n:'Venus',    k:'venus'},
    {g:'♂',n:'Mars',     k:'mars'},
  ];
  var rows2 = [
    {g:'♃',n:'Jupiter',  k:'jupiter'},
    {g:'♄',n:'Saturn',   k:'saturn'},
    {g:'♅',n:'Uranus',   k:'uranus'},
    {g:'♆',n:'Neptune',  k:'neptune'},
    {g:'♇',n:'Pluto',    k:'pluto'},
  ];

  function rowHTML(r, last){
    var p = pd[r.k];
    if(!p) return '';
    var s = signOf(p.ecl);
    return '<div class="pt-row'+(last?' last':'')+'">'+
      '<span class="pg">'+r.g+'</span>'+
      '<span class="pn">'+r.n+'</span>'+
      '<span class="pd">'+degStr(p.ecl)+(p.retrograde?' <span style="color:#e87070;font-size:10px">℞</span>':'')+'</span>'+
      '<span class="ps">'+s.glyph+' '+s.name+'</span>'+
      '</div>';
  }

  var asc = pd.asc, mc = pd.mc;
  var ascS = asc ? signOf(asc.ecl) : {glyph:'',name:''};
  var mcS  = mc  ? signOf(mc.ecl)  : {glyph:'',name:''};

  document.getElementById('planet-table').innerHTML =
    '<div class="pt-title">Planet Positions</div>'+
    '<div class="pt-rows">'+
      '<div class="pt-col">'+rows.map(function(r,i){return rowHTML(r,i===rows.length-1);}).join('')+'</div>'+
      '<div class="pt-div"></div>'+
      '<div class="pt-col">'+rows2.map(function(r,i){return rowHTML(r,i===rows2.length-1);}).join('')+'</div>'+
    '</div>'+
    '<div class="pt-axis">'+
      '<div class="pt-ai"><div class="pt-ain"><span></span><span class="pt-al">AC Ascendant</span>'+
        '<span class="pd">'+(asc?degStr(asc.ecl):'')+'</span>'+
        '<span class="ps">'+(asc?ascS.glyph+' '+ascS.name:'')+'</span></div></div>'+
      '<div class="pt-div"></div>'+
      '<div class="pt-ai"><div class="pt-ain"><span></span><span class="pt-al">MC Midheaven</span>'+
        '<span class="pd">'+(mc?degStr(mc.ecl):'')+'</span>'+
        '<span class="ps">'+(mc?mcS.glyph+' '+mcS.name:'')+'</span></div></div>'+
    '</div>';
}

// ── MAIN GENERATE ──
document.getElementById('gen-btn').addEventListener('click', async function(){
  var btn = this;
  var status = document.getElementById('status');
  var name   = document.getElementById('f-name').value.trim();
  var date   = document.getElementById('f-date').value;
  var time   = document.getElementById('f-time').value;
  var city   = document.getElementById('f-city').value.trim();
  var country= document.getElementById('f-country').value.trim();

  if(!name||!date||!time||!city){
    status.textContent='Please fill in all fields.';status.className='status error';return;
  }

  btn.disabled=true;
  status.className='status';

  try {
    status.textContent='Looking up coordinates for '+city+'…';
    var geo = await geocode(city, country);

    status.textContent='Determining timezone…';
    var tz = await getTimezone(geo.lat, geo.lng);

    var parts = date.split('-');
    var tparts = time.split(':');
    var year=parseInt(parts[0]),month=parseInt(parts[1]),day=parseInt(parts[2]);
    var hour=parseInt(tparts[0]),minute=parseInt(tparts[1]);

    status.textContent='Calculating chart…';
    var raw = await fetchChart(name,year,month,day,hour,minute,geo.lat,geo.lng,city,tz);

    status.textContent='Drawing wheel…';
    var chartData = parseChart(raw);

    if(!chartData.houses || chartData.houses.length < 12){
      throw new Error('Could not parse house cusps from API response. Check console for raw data.');
    }

    drawWheel(chartData, name, date);
    buildTable(chartData, name, date);

    document.getElementById('chart-wrap').style.display='block';
    status.textContent='✦ Chart complete for '+name;
    status.className='status success';

    // Download button
    document.getElementById('dl-btn').onclick = function(){
      var canvas = document.getElementById('wheel');
      var a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = name.toLowerCase().replace(/\s+/g,'-')+'-natal-chart.png';
      a.click();
    };

  } catch(err){
    status.textContent = '✦ Error: '+err.message;
    status.className='status error';
    console.error(err);
  }

  btn.disabled=false;
});
</script>
